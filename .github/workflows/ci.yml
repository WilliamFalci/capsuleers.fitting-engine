name: ci

# Validate every push/PR against the committed dataset (data/): the package
# type-checks, builds, and stays at Pyfa parity with full effect coverage.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:pyfa        # 631 assertions vs committed data/
      - run: npm run audit:coverage   # truly silent: 0
