name: pyfa-drift

# Watches pyfa-org/Pyfa's eos/effects.py for changes to the set of hardcoded
# effect handlers. SDE balance changes flow through the data bundle without
# touching this package; NEW hardcoded mechanics are code and need a human to
# port + re-run parity. This job surfaces exactly which effect IDs changed.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Check Pyfa drift
        id: drift
        run: |
          set +e
          node scripts/check-pyfa-drift.mjs | tee drift-report.txt
          echo "code=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Open issue on drift
        if: steps.drift.outputs.code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const body = fs.readFileSync('drift-report.txt', 'utf8')
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pyfa effects.py drift detected (${new Date().toISOString().slice(0,10)})`,
              body: '```\n' + body.slice(0, 60000) + '\n```\n\n' +
                    'Port/verify the affected `applyLegacy*` handlers, then run `npm run test:pyfa` ' +
                    'in capsuleers.app against the new SDE before releasing. ' +
                    'Refresh the snapshot with `node scripts/check-pyfa-drift.mjs --update`.',
              labels: ['pyfa-drift'],
            })
      - name: Fail the run if drift
        if: steps.drift.outputs.code == '2'
        run: exit 1
